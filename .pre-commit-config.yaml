repos:
- repo: https://github.com/pypa/pip-audit
  rev: v2.7.3
  hooks:
  - id: pip-audit
    args:
    - -r
    - requirements.txt
    stages:
    - pre-commit

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.5.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
